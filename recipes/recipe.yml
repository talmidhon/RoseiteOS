# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: roseiteos
description: RoseiteOS - A completely hermetic, terminal-free, secure study system.
base-image: ghcr.io/ublue-os/kinoite-main
image-version: 43

modules:
  # שינוי השם והגרסה המוצגים במערכת
  - type: os-release
    properties:
      name: "RoseiteOS"
      pretty-name: "RoseiteOS"
      version: "0.1"

  - type: script
    scripts:
      - add-repos.sh

  - type: rpm-ostree
    install:
      - onlyoffice-desktopeditors
      - sayonara
    remove:
      # דפדפנים וטרמינל (כולל חבילות השפה)
      - firefox
      - firefox-langpacks
      - konsole
      
      # רשת וקישוריות (כולל כל הפלאגינים והשירותים)
      - plasma-nm
      - plasma-nm-vpnc
      - plasma-nm-openvpn
      - kde-connect
      - kde-connect-libs
      - kdeconnectd
      - krfb
      - krfb-libs
      
      # כלי מערכת (כולל פלאגינים והתראות)
      - plasma-discover
      - plasma-discover-notifier
      - plasma-discover-kns
      - kate
      - kate-plugins
      - kate-krunner-plugin
      - kwrite
      - firewall-config
      - kwalletmanager5
      - khelpcenter
      - plasma-welcome
      - kdebugsettings
      - kernel-modules-extra
      
      # מנועי קלט
      - fcitx5
      - fcitx5-mozc
      - fcitx5-data

  # התקנת Obsidian כ-Flatpak בצורה מובנית
  - type: default-flatpaks
    notify: false
    system:
      install:
        - md.obsidian.Obsidian

  - type: script
    scripts:
      - set-defaults.sh # סקריפט המקלדת שהוספנו
      - install-zayit.sh
      - hermetic-lock.sh
      - create-shortcut.sh
